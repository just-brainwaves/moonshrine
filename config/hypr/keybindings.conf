# SUPER
$mainMod = SUPER


# Custom Binds
bind = $mainMod SHIFT, W, exec, /home/just-brainwaves/.config/hypr/Scripts/cycle_wallpapers.sh
bind = $mainMod SHIFT, C, exec, /home/just-brainwaves/.config/hypr/Scripts/toggle_waybar.sh
bind = $mainMod, F4, exec, /home/just-brainwaves/.config/hypr/Scripts/game_mode.sh
bind = $mainMod, F, fullscreen
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, D, exec, kitten quick-access-terminal

bind = , Print, exec, FILE=~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png; grim "$FILE" && notify-send "Screenshot Saved" "$FILE" -i "$FILE"
bind = SHIFT, Print, exec, FILE=~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png; grim -g "$(slurp)" "$FILE" && notify-send "Region Screenshot Saved" "$FILE" -i "$FILE"
bind = CTRL, Print, exec, grim - | wl-copy
bind = CTRL SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot Copied to Clipboard"
bind = ALT, Print, exec, grim -g "$(slurp)" - | swappy -f -

bindl = , Caps_Lock, exec, sh -c "sleep 0.1 && swayosd-client --caps-lock-led input3::capslock"
bindl = , Num_Lock, exec, sh -c "sleep 0.1 && swayosd-client --num-lock-led input3::numlock"
bind = SUPER, V, exec, sh -c 'printf "Clear Clipboard History\n"; cliphist list' | rofi -dmenu -p "Clipboard" | if read -r sel; then [ "$sel" = "Clear Clipboard History" ] && cliphist wipe && notify-send "Clipboard history cleared" || echo "$sel" | cliphist decode | wl-copy; fi

bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev

# bind = SUPER, O, exec, wf-recorder -g "$(slurp)" -c libx264 -p preset=fast -f ~/Videos/clip-$(date +%F-%H-%M-%S).mp4
bind = SUPER, O, exec, pkill -INT wf-recorder && notify-send "Recording Stopped" || (notify-send "Recording Started" && wf-recorder -g "$(slurp)" -c libx264 -p preset=fast -f ~/Videos/clip-$(date +%F-%H-%M-%S).mp4)


# Default Binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManagerT
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod, R, exec, $reload_waybar
bind = $mainMod, T, togglefloating
bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_workspaces.sh 1
bind = $mainMod, 2, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_workspaces.sh 2
bind = $mainMod, 3, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_workspaces.sh 3
bind = $mainMod, 4, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_workspaces.sh 4
bind = $mainMod, 5, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_workspaces.sh 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_movetoworkspace.sh 1
bind = $mainMod SHIFT, 2, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_movetoworkspace.sh 2
bind = $mainMod SHIFT, 3, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_movetoworkspace.sh 3
bind = $mainMod SHIFT, 4, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_movetoworkspace.sh 4
bind = $mainMod SHIFT, 5, exec, /home/just-brainwaves/.config/hypr/Scripts/smart_movetoworkspace.sh 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# ╔══════════════════════════════════════════════════════════════════╗
# ║  DUAL MONITOR KEYBINDINGS                                       ║
# ║  Append this block to ~/.config/hypr/keybindings.conf           ║
# ╚══════════════════════════════════════════════════════════════════╝

$primaryMon   = eDP-1       # Laptop screen
$secondaryMon = HDMI-A-1    # AOC external


# ── FOCUS: Jump between monitors ─────────────────────────────────────
# SUPER + ;        → Focus next monitor (cycles Primary ↔ Secondary)
# SUPER + SHIFT+;  → Focus previous monitor
# SUPER + '        → Jump directly to Laptop screen
# SUPER + #        → Jump directly to AOC screen   (# = backslash key)

bind = $mainMod,       semicolon,   focusmonitor, +1
bind = $mainMod SHIFT, semicolon,   focusmonitor, -1
bind = $mainMod,       apostrophe,  focusmonitor, $primaryMon
bind = $mainMod,       backslash,   focusmonitor, $secondaryMon


# ── WINDOW: Send window to other monitor (you stay put) ──────────────
# SUPER + SHIFT + '        → Send window to Laptop screen
# SUPER + SHIFT + \        → Send window to AOC screen

bind = $mainMod SHIFT, apostrophe,  movewindow, mon:$primaryMon
bind = $mainMod SHIFT, backslash,   movewindow, mon:$secondaryMon


# ── WINDOW: Move window AND warp your focus with it ──────────────────
# SUPER + ALT + '   → Window + you → Laptop screen
# SUPER + ALT + \   → Window + you → AOC screen
# SUPER + ALT + ,   → Window + you → previous monitor
# SUPER + ALT + .   → Window + you → next monitor

bind = $mainMod ALT, apostrophe, exec, hyprctl dispatch movewindow mon:$primaryMon   && hyprctl dispatch focusmonitor $primaryMon
bind = $mainMod ALT, backslash,  exec, hyprctl dispatch movewindow mon:$secondaryMon && hyprctl dispatch focusmonitor $secondaryMon
bind = $mainMod ALT, comma,      exec, hyprctl dispatch movewindow mon:-1 && hyprctl dispatch focusmonitor -1
bind = $mainMod ALT, period,     exec, hyprctl dispatch movewindow mon:+1 && hyprctl dispatch focusmonitor +1


# ── WORKSPACE: Cycle workspaces scoped to the focused monitor ────────
# SUPER + CTRL + →   → Next workspace on THIS monitor only
# SUPER + CTRL + ←   → Prev workspace on THIS monitor only

bind = $mainMod CTRL, right, workspace, m+1
bind = $mainMod CTRL, left,  workspace, m-1


# ── WORKSPACE: Move current workspace to other monitor ───────────────
# SUPER + CTRL + SHIFT + →   → Push workspace to next monitor
# SUPER + CTRL + SHIFT + ←   → Push workspace to prev monitor

bind = $mainMod CTRL SHIFT, right, movecurrentworkspacetomonitor, +1
bind = $mainMod CTRL SHIFT, left,  movecurrentworkspacetomonitor, -1


# ── MONITOR: Swap all workspaces between both screens ────────────────
# SUPER + CTRL + S   → Swap everything: Laptop ↔ AOC

bind = $mainMod CTRL, S, swapactiveworkspaces, $primaryMon $secondaryMon


# ── MONITOR: Toggle secondary monitor on/off (DPMS) ──────────────────
# SUPER + CTRL + D   → Toggle AOC monitor sleep/wake

bind = $mainMod CTRL, D, exec, hyprctl dispatch dpms toggle HDMI-A-1


# ── MONITOR: Mirror secondary onto primary (toggle) ──────────────────
# SUPER + CTRL + M   → Mirror AOC onto laptop / restore side-by-side

bind = $mainMod CTRL, M, exec, ~/.config/hypr/Scripts/toggle_mirror.sh