# ╔══════════════════════════════════════════════════════════════════╗

# ║                         HYPRLAND ANIMATIONS                       ║

# ╚══════════════════════════════════════════════════════════════════╝

animations {
enabled = true


# ── Bezier Curves ──────────────────────────────────────────────
bezier = snap,         0.19, 1,    0.22, 1
bezier = snapBack,     0.34, 1.4,  0.64, 1
bezier = bounce,       0.2,  1.8,  0.4,  1
bezier = gentleBounce, 0.34, 1.2,  0.64, 1
bezier = glide,        0.25, 0.46, 0.45, 0.94
bezier = glideOut,     0.16, 1,    0.3,  1
bezier = glideSoft,    0.4,  0,    0.2,  1
bezier = outCirc,      0,    0.55, 0.45, 1
bezier = outExpo,      0.16, 1,    0.3,  1
bezier = inOutExpo,    0.87, 0,    0.13, 1
bezier = linear,       0,    0,    1,    1
bezier = instant,      0.02, 0.02, 0.02, 0.02

# ── Windows ────────────────────────────────────────────────────
animation = windows,     1, 4, snapBack
animation = windowsIn,   1, 4, bounce,       popin 55%
animation = windowsOut,  1, 4, glideOut,     slidevert
animation = windowsMove, 1, 3, outCirc

# ── Fade ───────────────────────────────────────────────────────
animation = fade,        1, 4, glideOut
animation = fadeIn,      1, 4, glideOut
animation = fadeOut,     1, 3, instant
animation = fadeDim,     1, 4, inOutExpo

# ── Layers — Waybar, Rofi, Notifications ───────────────────────
animation = layers,         1, 3, snap
animation = layersIn,       1, 4, gentleBounce, slide
animation = layersOut,      1, 2, instant,      fade
animation = fadeLayersIn,   1, 3, glideOut
animation = fadeLayersOut,  1, 2, instant

# ── Workspaces ─────────────────────────────────────────────────
animation = workspaces,     1, 4, glideSoft,  slide
animation = workspacesIn,   1, 4, outCirc,    slidefade 25%
animation = workspacesOut,  1, 3, glideOut,   slidefade 25%

# ── Special Workspace (Scratchpad) ─────────────────────────────
animation = specialWorkspace,    1, 4, snapBack,  slidevert
animation = specialWorkspaceIn,  1, 4, glideSoft, slidevert
animation = specialWorkspaceOut, 1, 6, glideOut,  slidevert

# ── Border glow ────────────────────────────────────────────────
animation = border,      1, 2,  linear
animation = borderangle, 1, 250, linear, loop


}
