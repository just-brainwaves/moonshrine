# ╔══════════════════════════════════════════════════════════════════╗
# ║                  M O O N S H R I N E                            ║
# ║                   HYPRLAND ANIMATIONS                            ║
# ╚══════════════════════════════════════════════════════════════════╝

animations {
    enabled = true

    # ── Bezier Curves ────────────────────────────────────────────────
    # Sharp snap — for UI elements that should feel instant but smooth
    bezier = snap,          0.19, 1,    0.22, 1

    # Slight overshoot — satisfying spring for window open
    bezier = spring,        0.34, 1.3,  0.64, 1

    # Soft overshoot — gentler spring for layers/popups
    bezier = springLight,   0.34, 1.15, 0.64, 1

    # Clean deceleration — for workspace slides
    bezier = glide,         0.25, 0.46, 0.45, 0.94

    # Aggressive deceleration — fast start, floats to rest
    bezier = glideOut,      0.16, 1,    0.3,  1

    # Smooth in-out — for fades and dims
    bezier = smooth,        0.4,  0,    0.2,  1

    # Expo out — snappy exits
    bezier = outExpo,       0.16, 1,    0.3,  1

    # Circular out — window moves feel physical
    bezier = outCirc,       0,    0.55, 0.45, 1

    # Linear — border rotation only
    bezier = linear,        0,    0,    1,    1

    # Instant — for things that should just disappear
    bezier = instant,       0.02, 0.02, 0.02, 0.02

    # ── Windows ──────────────────────────────────────────────────────
    # Open: pops in with a spring, starts at 70% size — feels alive
    animation = windowsIn,   1, 4,  spring,    popin 70%

    # Close: slides down and out fast — clean exit
    animation = windowsOut,  1, 3,  outExpo,   slidevert

    # Move: physical circular arc when dragging
    animation = windowsMove, 1, 3,  outCirc

    # ── Fade ─────────────────────────────────────────────────────────
    # Fade in: smooth glide
    animation = fadeIn,      1, 4,  glideOut

    # Fade out: snappy — things disappear crisply
    animation = fadeOut,     1, 2,  outExpo

    # Dim inactive windows: slow and smooth so it's not distracting
    animation = fadeDim,     1, 6,  smooth

    # Fade switch: when switching focus
    animation = fadeSwitch,  1, 4,  smooth

    # ── Layers — Waybar, Rofi, Swaync, Notifications ─────────────────
    # Waybar / rofi slide in with a gentle spring
    animation = layersIn,      1, 3,  springLight, slide

    # Layers out: instant fade — no lingering
    animation = layersOut,     1, 2,  instant,     fade

    animation = fadeLayersIn,  1, 3,  glideOut
    animation = fadeLayersOut, 1, 2,  outExpo

    # ── Workspaces ───────────────────────────────────────────────────
    # Slide with deceleration — feels like swiping on a phone
    animation = workspaces,    1, 4,  glideOut,   slide

    # Incoming workspace: slides in with fade for depth
    animation = workspacesIn,  1, 4,  glideOut,   slidefade 20%

    # Outgoing workspace: slightly faster exit
    animation = workspacesOut, 1, 3,  outExpo,    slidefade 20%

    # ── Special Workspace (Scratchpad) ───────────────────────────────
    # Drops down from top with spring — dramatic entrance
    animation = specialWorkspaceIn,  1, 5,  spring,   slidevert

    # Snaps back up quickly
    animation = specialWorkspaceOut, 1, 4,  outExpo,  slidevert

    # ── Border ───────────────────────────────────────────────────────
    # Slow spin — subtle, not distracting at 180s per rotation
    animation = border,      1, 2,   linear
    animation = borderangle, 1, 180, linear, loop
}