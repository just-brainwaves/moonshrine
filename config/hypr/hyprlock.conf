# ╔══════════════════════════════════════════════╗
# ║         M O O N S H R I N E                 ║
# ║           hyprlock.conf                      ║
# ╚══════════════════════════════════════════════╝

# ── Background ───────────────────────────────────
background {
    monitor     =
    path        = ~/.config/hypr/hyprlockNope.jpg
    blur_passes = 2
    blur_size   = 4
    brightness  = 0.65
    contrast    = 1.05
    vibrancy    = 0.10
}

# ── General ──────────────────────────────────────
general {
    no_fade_in          = false
    no_fade_out         = false
    grace               = 2
    disable_loading_bar = true
}

# ── Time (top) ───────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%H:%M')"
    color       = rgba(eaeaf4ff)
    font_size   = 72
    font_family = SF Pro Display Bold
    halign      = center
    valign      = center
    position    = 0, 250
}

# ── Date (below time) ────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color       = rgba(5e5e72ff)
    font_size   = 14
    font_family = SF Pro Display Regular
    halign      = center
    valign      = center
    position    = 0, 180
}

# ── Avatar (center) ──────────────────────────────
image {
    monitor      =
    path         = ~/.config/hypr/profile.jpg
    size         = 120
    rounding     = -1
    border_size  = 2
    border_color = rgba(c01638cc)
    halign       = center
    valign       = center
    position     = 0, 60
}

# ── Username (below avatar) ──────────────────────
label {
    monitor     =
    text        = cmd[update:0] echo "$(whoami)"
    color       = rgba(cecee0ff)
    font_size   = 20
    font_family = SF Pro Display Bold
    halign      = center
    valign      = center
    position    = 0, -30
}

# ── Password Field ───────────────────────────────
input-field {
    monitor           =
    size              = 280, 48
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.25
    dots_center       = true
    inner_color       = rgba(08080dcc)
    outer_color       = rgba(9e0e2ecc)
    check_color       = rgba(c01638ff)
    fail_color        = rgba(f04068ff)
    font_color        = rgba(eaeaf4ff)
    font_family       = SF Pro Display Regular
    placeholder_text  = <span foreground="##5e5e72">󰍁  Enter Password</span>
    hide_input        = false
    fade_on_empty     = true
    rounding          = 10
    halign            = center
    valign            = center
    position          = 0, -110
    capslock_color    = rgba(de2448ff)
}

# ── Fail Message ─────────────────────────────────
label {
    monitor     =
    text        = $FAIL
    color       = rgba(f04068cc)
    font_size   = 12
    font_family = SF Pro Display Regular
    halign      = center
    valign      = center
    position    = 0, -170
}