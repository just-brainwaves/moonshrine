# ╔══════════════════════════════════════════════════════════════════╗
# ║                  M O O N S H R I N E                            ║
# ║                   HYPRLAND THEME                                 ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Palette reference:
#   scarlet    #c01638    crimson    #9e0e2e
#   roseblood  #de2448    moonlight  #cecee0
#   void       #08080d    iron       #252535

general {
    # Crimson → moonlight → crimson — like berries glowing in the dark
    col.active_border   = rgba(c01638ff) rgba(cecee0ff) rgba(9e0e2eff) rgba(c01638ff) 45deg
    col.inactive_border = rgba(08080d00)
    gaps_in             = 6
    gaps_out            = 20
    border_size         = 2
}

decoration {
    rounding            = 10
    rounding_power      = 5

    active_opacity      = 1.0
    inactive_opacity    = 0.90
    fullscreen_opacity  = 1.0

    shadow {
        enabled         = true
        range           = 40
        render_power    = 4
        # Deep crimson shadow — subtle but unmistakable
        color           = rgba(9e0e2e55)
        color_inactive  = rgba(08080d60)
        offset          = 0, 6
        scale           = 0.98
    }

    blur {
        enabled           = true
        size              = 9
        passes            = 4
        noise             = 0.010
        contrast          = 1.10
        brightness        = 0.88
        vibrancy          = 0.18
        vibrancy_darkness = 0.40
        special           = true
        popups            = true
    }
}