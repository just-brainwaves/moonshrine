# █▀▄▀█ █▀█ █▄ █ █ ▀█▀ █▀█ █▀█
# █ ▀ █ █▄█ █ ▀█ █  █  █▄█ █▀▄

monitor = eDP-1,    1920x1080@144.00, 0x0,    1   # Laptop  — 144.00Hz exact
monitor = HDMI-A-1, 1920x1080@74.97,  1920x0, 1   # AOC     — 74.97Hz exact  # Secondary — AOC 24B2W1G5 (75Hz)
# monitor = ,preferred,auto,1                    # Fallback for any extra monitor
 
 
# ── Workspace Pinning ────────────────────────────────────────
# Workspaces 1–5  live on the Laptop screen
# Workspaces 6–10 live on the AOC HDMI screen
 
workspace = 1,  monitor:eDP-1,    default:true
workspace = 2,  monitor:eDP-1
workspace = 3,  monitor:eDP-1
workspace = 4,  monitor:eDP-1
workspace = 5,  monitor:eDP-1
 
workspace = 6,  monitor:HDMI-A-1, default:true
workspace = 7,  monitor:HDMI-A-1
workspace = 8,  monitor:HDMI-A-1
workspace = 9,  monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
 

# █▀▄▀█ █ █▀ █▀▀
# █ ▀ █ █ ▄█ █▄▄

$terminal = kitty
$fileManager = thunar
$fileManagerT = kitty -e yazi
$menu = rofi -show drun
$reload_waybar = pkill waybar && waybar &



# █   ▄▀█ █ █ █▄ █ █▀▀ █ █
# █▄▄ █▀█ █▄█ █ ▀█ █▄▄ █▀█

exec-once = waybar 
exec-once = swww-daemon
exec-once = swaync
exec-once = blueman-applet
exec-once = hypridle
exec-once =  kwybars-daemon --config ~/.config/kwybars/custom/my_config.toml &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swayosd-server &
exec-once = hyprctl setcursor phinger-cursors-dark 24
exec-once = snappy-switcher --daemon


# █▀▀ █▄ █ █ █
# ██▄ █ ▀█ ▀▄▀

env = XCURSOR_THEME,phinger-cursors-dark
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,phinger-cursors-dark
env = HYPRCURSOR_SIZE,24


# █   ▄▀█ █▄█ █▀█ █ █ ▀█▀ █▀
# █▄▄ █▀█  █  █▄█ █▄█  █  ▄█

dwindle {
    pseudotile = true
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}



# █ █▄ █ █▀█ █ █ ▀█▀
# █ █ ▀█ █▀▀ █▄█  █

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}
gesture = 3, horizontal, workspace
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


# █▀ █▀█ █ █ █▀█ █▀▀ █▀▀
# ▄█ █▄█ █▄█ █▀▄ █▄▄ ██▄

source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/nvidia.conf
source = ~/.config/hypr/theme.conf

